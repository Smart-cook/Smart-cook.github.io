  border-radius: 6px;

  padding: 10px;

  cursor: pointer;

}

#output {
  margin-top: 20px;
  white-space: pre-wrap;
  background: #f7f7f7;
  padding: 15px;
  border-radius: 6px;
}
</style>
</head>

<div id="recipes"></div>

<button onclick="generateList()">Generate Shopping List</button>
<button onclick="window.print()">Print</button>

<div id="output"></div>

<script>

// -----------------------
// 9. American Succotash
// -----------------------
"succotash": {
name: "American Succotash",
servings: 9,
ingredients: {

"lima beans cans": {qty: 2, cost: 1.5},

"green beans pack": {qty: 1, cost: 1.5},
"corn cups": {qty: 4, cost: 1.5},
"courgettes": {qty: 3, cost: 2},
"parsley pack": {qty: 1, cost: 0.52},
"olive oil (ml)": {qty: 118, cost: 6},
"black pepper tsp": {qty: 2, cost: 1.7},
"maggi cubes": {qty: 5, cost: 2.5},
"salt": {qty: 1, cost: 0.5}
}
}

};

// =======================
// UI
// =======================

const container = document.getElementById("recipes");

for (let key in recipes) {
const r = recipes[key];

let html = `
<div class="recipe">
<label>
<input type="checkbox" value="${key}">
<strong>${r.name}</strong>
</label>
`;

if (r.options?.meat) {
html += `<div class="small">Choose meat:</div>`;
html += `<select id="opt_${key}">`;

r.options.meat.forEach((m, i) => {
html += `<option value="${i}">${m.name} (+£${m.cost})</option>`;
});

html += `</select>`;
}

html += `</div>`;

container.innerHTML += html;
}

// =======================
// GENERATE
// =======================

function generateList() {

const checked = [...document.querySelectorAll("input[type=checkbox]:checked")]
.map(el => el.value);

if (checked.length === 0) {
document.getElementById("output").innerText = "Select at least one recipe.";
return;
}

let result = {};
let totalCost = 0;
let totalServings = 0;

checked.forEach(r => {

const recipe = recipes[r];
totalServings += recipe.servings;

// meat option
if (recipe.options?.meat) {
const sel = document.getElementById(`opt_${r}`);
const chosen = recipe.options.meat[sel.value];

if (!result[chosen.name]) {
result[chosen.name] = {qty: 1, cost: chosen.cost};
} else {
result[chosen.name].qty += 1;
result[chosen.name].cost += chosen.cost;
}

totalCost += chosen.cost;
}

// ingredients
for (let item in recipe.ingredients) {

if (!result[item]) {
result[item] = {...recipe.ingredients[item]};
} else {
result[item].qty += recipe.ingredients[item].qty;
result[item].cost += recipe.ingredients[item].cost;
}

totalCost += recipe.ingredients[item].cost;
}
});

// OUTPUT
let output = "SHOPPING LIST\n\n";

Object.keys(result).sort().forEach(item => {
output += `- ${item}: ${result[item].qty}\n`;
});

output += `\nTOTAL SERVINGS: ${totalServings}`;
output += `\nESTIMATED COST: £${totalCost.toFixed(2)}`;
output += `\nCOST PER SERVING: £${(totalCost / totalServings).toFixed(2)}`;

document.getElementById("output").innerText = output;
}

</script>
