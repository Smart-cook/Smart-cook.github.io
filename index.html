<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Batch Cooking Shopping List</title>

<style>
body { font-family: Arial, sans-serif; margin: 20px; max-width: 950px; line-height: 1.4; }
h1 { font-size: 24px; margin-bottom: 8px; }

.recipe {
  margin: 10px 0;
  padding: 12px;
  background: #f7f7f7;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.small { color: #555; font-size: 13px; margin-top: 6px; }
.optionBox { margin: 8px 0 0 24px; }
select { margin-top: 6px; padding: 6px; }

button {
  padding: 11px 14px;
  margin-top: 14px;
  cursor: pointer;
  margin-right: 10px;
}

#output {
  margin-top: 22px;
  white-space: pre-wrap;
  background: #f7f7f7;
  padding: 16px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

@media print {
  button, .recipe, .small.intro { display: none; }
  body { max-width: 100%; }
  #output { border: none; background: white; }
}
</style>
</head>

<body>

<h1>Batch Cooking Shopping List Generator</h1>
<p class="small intro">Select any recipes. Meat choices and optional ingredients are included only when selected.</p>

<div id="recipes"></div>

<button onclick="generateList()">Generate Shopping List</button>
<button onclick="window.print()">Print</button>

<div id="output"></div>

  mustardPowder: { label: "mustard powder", size: 55, unit: "g", price: 1.5, category: "Seasonings, Herbs & Spices" },
  cinnamon: { label: "cinnamon powder", size: 55, unit: "g", price: 0.7, category: "Seasonings, Herbs & Spices" },
  cardamom: { label: "cardamom powder", size: 55, unit: "g", price: 3, category: "Seasonings, Herbs & Spices" },

function tspToG(x) { return x * 5; }
function tbspToG(x) { return x * 15; }
function cupToMl(x) { return x * 236; }
function cupFlourToG(x) { return x * 120; }
function cupButterToG(x) { return x * 227; }

const recipes = {

  indian_butter_chicken: {

  peanut_stew: {

    servings: 11,

        item("chicken drumsticks", "Meat & Seafood", 2, "kg", 4.5),

    },
    ingredients: [
      item("smooth peanut butter", "Oils, Sauces & Pantry", 340, "g", 2),
      packItem("tomatoes", "tomatoes", 9, "tomatoes"),
      packItem("garlic cloves", "garlic", 9, "cloves"),
      item("scotch bonnet peppers", "Vegetables", "1–2", "peppers", 0.25),
      packItem("red onions", "onions", 4, "onions"),
      item("ginger", "Vegetables", 6, "inches", 0.7),
      spice("ground cumin", "groundCumin", 3, "tsp"),
      spice("ground nutmeg", "groundNutmeg", 3, "tsp"),
      packItem("Maggi seasoning cubes", "maggi", 4, "cubes"),
      item("tomato paste", "Oils, Sauces & Pantry", 0.75, "cup", 0.7),

      item("peanuts", "Oils, Sauces & Pantry", 1, "packet", 1)
    ]
  },

  moqueca: {
    name: "Brazilian Moqueca de Camarão",
    servings: 8,
    ingredients: [

      packItem("palm oil", "palmOil", 118, "ml"),
      packItem("mixed colour bell peppers", "mixedBellPeppers", 6, "peppers"),
      packItem("garlic cloves", "garlic", 8, "cloves"),
      packItem("tomatoes", "tomatoes", 6, "tomatoes"),
      item("full fat coconut milk", "Oils, Sauces & Pantry", "2 x 400 ml cans", "", 1.6),
      item("lime", "Fruit", 1, "lime", 0.25),
      item("fresh parsley", "Fresh Herbs", 1, "packet", 0.6),
      packItem("onions", "onions", 2, "onions"),
      item("red chillies", "Vegetables", 3, "chillies", 0.6),
      packItem("Maggi/shrimp seasoning cubes", "maggi", 2, "cubes"),
      spice("ground coriander", "groundCoriander", 3, "tsp"),
      spice("ground cumin", "groundCumin", 4, "tsp"),
      pepper(3, "tsp"),
      salt(4, "tsp")
    ]
  },

  fricassee: {
    name: "French Fricassee",
    servings: 17,
    ingredients: [
      item("chicken drumsticks", "Meat & Seafood", 2, "kg", 4.5),
      packItem("carrots", "carrots", 6, "carrots"),
      salt(1, "tsp"),
      pepper(7, "tsp"),
      spice("mustard powder", "mustardPowder", 4, "tsp"),
      packItem("butter", "butter", cupButterToG(0.5), "g"),
      packItem("brown onions", "onions", 4, "onions"),
      item("mushrooms", "Vegetables", 650, "g", 1.7),
      spice("dried thyme", "driedThyme", 4, "tsp"),
      packItem("garlic cloves", "garlic", 6, "cloves"),
      packItem("flour", "flour", cupFlourToG(2), "g"),
      packItem("chicken stock cubes", "chickenStock", 4, "cubes"),
      packItem("Maggi seasoning cubes", "maggi", 5, "cubes"),
      item("double cream", "Dairy", 600, "ml", 2.8)
    ],
    optional: [
      item("fresh thyme", "Fresh Herbs", 1, "packet", 0.52),
      item("lemon", "Fruit", 1, "lemon", 0.4)
    ]
  },

  fesenjan: {
    name: "Persian Fesenjan",
    servings: 13,
    ingredients: [
      item("walnuts", "Oils, Sauces & Pantry", 800, "g", 7),
      item("chicken drumsticks", "Meat & Seafood", 2, "kg", 4.5),
      packItem("red or brown onions", "onions", 4, "onions"),
      packItem("olive oil", "oliveOil", 59, "ml"),
      item("pomegranate molasses", "Oils, Sauces & Pantry", 237, "ml", 4),
      packItem("chicken stock cubes", "chickenStock", 3, "cubes"),
      packItem("Maggi seasoning cubes", "maggi", 3, "cubes"),
      pepper(4, "tsp"),
      spice("ground turmeric", "groundTurmeric", 2, "tsp"),
      spice("saffron", "saffron", 1, "tsp"),
      salt(3, "tsp"),
      item("lime", "Fruit", 1, "lime", 0.25)
    ],
    optional: [
      spice("cinnamon powder", "cinnamon", 2, "tsp"),
      spice("cardamom powder", "cardamom", 2, "tsp"),
      spice("cayenne pepper", "cayennePepper", 1, "tsp"),
      item("pomegranate", "Fruit", 1, "pomegranate", 1)
    ]
  },

  succotash: {
    name: "American Succotash",
    servings: 9,
    ingredients: [
      packItem("red onions", "onions", 3, "onions"),
      item("lima beans or butter beans", "Oils, Sauces & Pantry", 2, "cans", 1.5),
      item("bell peppers", "Vegetables", 6, "peppers", 4),
      item("chorizo sausage", "Meat & Seafood", 1, "kg", 6),
      item("green beans", "Vegetables", 1, "packet", 1.5),
      item("sweet corn kernels", "Vegetables", 4, "cups", 1.5),
      item("courgettes", "Vegetables", 3, "courgettes", 2),
      item("fresh parsley", "Fresh Herbs", 1, "packet", 0.52),
      packItem("olive oil", "oliveOil", 118, "ml"),
      pepper(2, "tsp"),
      packItem("Maggi seasoning cubes", "maggi", 5, "cubes"),
      salt(0.25, "tsp")
    ]
  }
};

function item(name, category, amount, unit, cost) {
  return { name, category, amount, unit, directCost: cost || 0 };
}

function packItem(name, pack, amount, unit) {
  return { name, category: packs[pack].category, amount, unit, pack };
}

function spice(name, pack, amount, unit) {
  const grams = unit === "tbsp" ? tbspToG(amount) : tspToG(amount);
  return { name, category: "Seasonings, Herbs & Spices", amount: grams, unit: "g", pack, displayAmount: amount, displayUnit: unit };
}

function salt(amount, unit) {
  return { name: "salt", category: "Seasonings, Herbs & Spices", amount: tspToG(amount), unit: "g", pack: "salt", displayAmount: amount, displayUnit: unit };
}

function pepper(amount, unit) {
  return { name: "ground black pepper", category: "Seasonings, Herbs & Spices", amount: tspToG(amount), unit: "g", pack: "blackPepper", displayAmount: amount, displayUnit: unit };
}

const container = document.getElementById("recipes");

Object.keys(recipes).forEach(key => {
  const r = recipes[key];

  let html = `<div class="recipe">
    <label><input type="checkbox" value="${key}"> <strong>${r.name}</strong> <span class="small">(${r.servings} servings)</span></label>`;

  if (r.options && r.options.meat) {
    html += `<div class="optionBox"><div class="small">Choose meat:</div><select id="meat_${key}">`;
    r.options.meat.forEach((m, i) => {
      html += `<option value="${i}">${m.name}: ${formatAmount(m.amount, m.unit)}</option>`;
    });
    html += `</select></div>`;
  }

  if (r.optional && r.optional.length) {
    html += `<div class="optionBox"><div class="small">Optional ingredients:</div>`;
    r.optional.forEach((opt, i) => {
      html += `<label class="small"><input type="checkbox" id="optional_${key}_${i}"> ${opt.name}: ${formatAmount(opt.amount, opt.unit)}</label><br>`;
    });
    html += `</div>`;
  }

  html += `</div>`;
  container.innerHTML += html;
});

function addToMap(map, ingredient) {
  const key = ingredient.pack ? `pack:${ingredient.pack}` : `direct:${ingredient.name.toLowerCase()}:${ingredient.unit}`;

  if (!map[key]) {
    map[key] = {
      name: ingredient.pack ? packs[ingredient.pack].label : ingredient.name,
      category: ingredient.category,
      amount: 0,
      unit: ingredient.pack ? packs[ingredient.pack].unit : ingredient.unit,
      directCost: 0,
      pack: ingredient.pack || null
    };
  }

  map[key].amount += numericAmount(ingredient.amount);
  if (!ingredient.pack) map[key].directCost += ingredient.directCost || 0;
}

function numericAmount(x) {
  if (typeof x === "number") return x;
  return 1;
}

function formatAmount(amount, unit) {
  if (typeof amount === "string") return amount;
  const rounded = Math.round(amount * 100) / 100;

  if (!unit) return `${rounded}`;

  if (unit === "ml") return `${Math.round(rounded)} ml`;
  if (unit === "g") return `${Math.round(rounded)} g`;
  if (unit === "kg") return `${rounded} kg`;
  if (unit === "tsp") return `${rounded} tsp`;
  if (unit === "tbsp") return `${rounded} tbsp`;
  if (unit === "cup") return `${rounded} cup${rounded === 1 ? "" : "s"}`;

  return `${rounded} ${unit}`;
}

function generateList() {
  const checked = [...document.querySelectorAll('input[type="checkbox"][value]:checked')].map(e => e.value);

  if (!checked.length) {
    document.getElementById("output").innerText = "Select at least one recipe.";
    return;
  }

  const shopping = {};
  let totalServings = 0;

  checked.forEach(recipeKey => {
    const recipe = recipes[recipeKey];
    totalServings += recipe.servings;

    if (recipe.options && recipe.options.meat) {
      const selected = document.getElementById(`meat_${recipeKey}`).value;
      addToMap(shopping, recipe.options.meat[selected]);
    }

    recipe.ingredients.forEach(addToMap);

    if (recipe.optional) {
      recipe.optional.forEach((opt, i) => {
        const box = document.getElementById(`optional_${recipeKey}_${i}`);
        if (box && box.checked) addToMap(shopping, opt);
      });
    }
  });

  const grouped = {};
  let totalCost = 0;

  Object.values(shopping).forEach(entry => {
    let cost = entry.directCost || 0;

    if (entry.pack) {
      const p = packs[entry.pack];
      cost = Math.ceil(entry.amount / p.size) * p.price;
    }

    totalCost += cost;

    if (!grouped[entry.category]) grouped[entry.category] = [];
    grouped[entry.category].push(`- ${entry.name}: ${formatAmount(entry.amount, entry.unit)}`);
  });

  const order = [
    "Meat & Seafood",
    "Vegetables",
    "Fruit",
    "Fresh Herbs",
    "Dairy",
    "Oils, Sauces & Pantry",
    "Seasonings, Herbs & Spices",
    "Other"
  ];

  let output = "SHOPPING LIST\n\n";

  order.forEach(category => {
    if (grouped[category]) {
      output += `${category.toUpperCase()}\n`;
      grouped[category].sort().forEach(line => output += `${line}\n`);
      output += "\n";
    }
  });

  output += `TOTAL SERVINGS: ${totalServings}`;
  output += `\nESTIMATED TOTAL COST: £${totalCost.toFixed(2)}`;
  output += `\nESTIMATED COST PER SERVING: £${(totalCost / totalServings).toFixed(2)}`;

  document.getElementById("output").innerText = output;
}
</script>

</body>
</html>
