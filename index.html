<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Batch Cooking Shopping List</title>

<style>
body { font-family: Arial; margin: 20px; max-width: 900px; }
h1 { font-size: 22px; }

.recipe {
  margin: 10px 0;
  padding: 10px;
  background: #f7f7f7;
  border-radius: 6px;
}

.small { color: #666; font-size: 12px; margin-top: 5px; }

select { margin-top: 6px; padding: 5px; }

button {
  padding: 10px;
  margin-top: 10px;
  cursor: pointer;
  margin-right: 10px;
}

#output {
  margin-top: 20px;
  white-space: pre-wrap;
  background: #f7f7f7;
  padding: 15px;
  border-radius: 6px;
}
</style>
</head>

<body>

<h1>Batch Cooking Shopping List Generator</h1>
<p class="small">Select any combination of recipes + choose options where available</p>

<div id="recipes"></div>

<button onclick="generateList()">Generate Shopping List</button>
<button onclick="window.print()">Print</button>

<div id="output"></div>

<script>

// =======================
// INGREDIENT NORMALISATION
// =======================

// Ginger conversion: 1 inch ≈ 37.5g
function gingerToInches(g) {
  return Math.round((g / 37.5) * 10) / 10;
}

// =======================
// RECIPE DATABASE
// =======================

const recipes = {

"nigerian_pepper_stew": {

"salt": {qty: 2, cost: 0.5},
"palm oil (ml)": {qty: 118, cost: 2.5},
"fresh basil": {qty: 1, cost: 0.52}
}
},

// -----------------------
"butter_chicken": {
name: "Indian Butter Chicken",
servings: 15,
ingredients: {
"chicken breast (kg)": {qty: 2, cost: 12.5},
"red onion": {qty: 4, cost: 1},
"garlic": {qty: 1, cost: 0.5},
"ginger": {qty: gingerToInches(150), cost: 0.75}, // normalized
"red chilli": {qty: 4, cost: 0.6},
"lemon": {qty: 1, cost: 0.4},
"butter (g)": {qty: 100, cost: 2},
"tomato sauce (ml)": {qty: 1000, cost: 1.5},

"double cream (ml)": {qty: 600, cost: 2.8},
"garam masala": {qty: 8, cost: 1},
"ground coriander": {qty: 4, cost: 0.7},
"ground cumin": {qty: 8, cost: 0.6},
"ground turmeric": {qty: 8, cost: 0.6},
"cayenne pepper": {qty: 4, cost: 0.6},
"ground black pepper": {qty: 2, cost: 1.7},
"salt": {qty: 8, cost: 0.5}
}
},

// -----------------------
"japanese_curry_easy_method": {
name: "Japanese Curry (Easy Method)",
servings: 12,
ingredients: {
"beef (kg)": {qty: 1.1, cost: 12},
"potatoes": {qty: 4, cost: 2},
"carrots": {qty: 6, cost: 1.05},
"brown onion": {qty: 2, cost: 0.7},
"Golden curry roux blocks": {qty: 1, cost: 3.05},
"salt": {qty: 1, cost: 0.5},
"rosemary": {qty: 1, cost: 0.6}
}
},

// -----------------------
"japanese_curry_from_scratch": {
name: "Japanese Curry (From Scratch)",
servings: 12,
ingredients: {
"chicken breast fillets (kg)": {qty: 1.8, cost: 12},
"brown onion": {qty: 6, cost: 1},
"carrots": {qty: 6, cost: 0.7},
"garlic cloves": {qty: 9, cost: 0.5},
"ginger": {qty: gingerToInches(75), cost: 0.5},
"Maggi cube": {qty: 5, cost: 2.5},
"Japanese/Katsu curry powder": {qty: 6, cost: 3},
"Chinese 5 spice": {qty: 6, cost: 1},
"red chilli powder": {qty: 2, cost: 0.6},
"flour": {qty: 0.5, cost: 0.7},
"soy sauce": {qty: 3, cost: 0.6},
"honey": {qty: 3, cost: 1},
"distilled malt or rice vinegar": {qty: 3, cost: 0.4}
}
},

// -----------------------
"peanut_stew": {
name: "Peanut Stew",
servings: 11,

options: {
meat: [
{ name: "Chicken drumsticks (kg)", cost: 4.5 },
{ name: "Beef/goat meat (kg)", cost: 12 }
]
},

ingredients: {
"peanut butter (g)": {qty: 340, cost: 2},
"tomatoes": {qty: 9, cost: 2.1},
"garlic cloves": {qty: 9, cost: 0.4},
"scotch bonnet": {qty: 2, cost: 0.25},
"red onion": {qty: 4, cost: 1},
"ginger": {qty: gingerToInches(150), cost: 0.7},
"ground cumin": {qty: 3, cost: 0.6},
"ground nutmeg": {qty: 3, cost: 0.7},
"Maggi cubes": {qty: 4, cost: 2.5},
"tomato paste": {qty: 0.75, cost: 0.7},
"fresh spinach": {qty: 1, cost: 1},
"peanuts": {qty: 1, cost: 1}
}
},

// -----------------------
"moqueca": {
name: "Moqueca de Camarão",
servings: 8,
ingredients: {

"palm oil (ml)": {qty: 118, cost: 2.5},

"lime": {qty: 1, cost: 0.25},
"fresh parsley": {qty: 1, cost: 0.6},
"onions": {qty: 2, cost: 1},
"red chilli": {qty: 3, cost: 0.6},
"Maggi cubes": {qty: 2, cost: 2.5}
}
},

// -----------------------
"fricassee": {
name: "French Fricassee",
servings: 17,
ingredients: {
"chicken drumsticks (kg)": {qty: 2, cost: 4.5},
"carrots": {qty: 6, cost: 0.7},
"butter (g)": {qty: 113, cost: 2},
"brown onion": {qty: 4, cost: 1},
"mushrooms (g)": {qty: 650, cost: 1.7},
"garlic cloves": {qty: 6, cost: 0.4},
"double cream (ml)": {qty: 600, cost: 2.8},
"flour": {qty: 2, cost: 0.7},
"dried thyme": {qty: 4, cost: 0.85},
"chicken stock cubes": {qty: 4, cost: 0.7},
"Maggi cubes": {qty: 5, cost: 2.5}
}
},

// -----------------------
"fesenjan": {
name: "Persian Fesenjan",
servings: 13,
ingredients: {
"walnuts (g)": {qty: 800, cost: 7},
"chicken drumsticks (kg)": {qty: 2, cost: 4.3},
"red onion": {qty: 4, cost: 1},
"olive oil (tbsp)": {qty: 4, cost: 6},
"pomegranate molasses": {qty: 237, cost: 4},
"chicken stock cubes": {qty: 3, cost: 0.7},
"Maggi cubes": {qty: 3, cost: 2.5},
"ground black pepper": {qty: 4, cost: 1.7},
"ground turmeric": {qty: 2, cost: 0.6},
"saffron": {qty: 1, cost: 3},

}
},

// -----------------------
"succotash": {
name: "American Succotash",
servings: 9,
ingredients: {
"red onion": {qty: 3, cost: 1},
"lima beans cans": {qty: 2, cost: 1.5},
"bell peppers": {qty: 6, cost: 4},
"chorizo (kg)": {qty: 1, cost: 6},
"green beans pack": {qty: 1, cost: 1.5},
"corn cups": {qty: 4, cost: 1.5},
"courgettes": {qty: 3, cost: 2},
"fresh parsley": {qty: 1, cost: 0.52},
"olive oil (ml)": {qty: 118, cost: 6},
"ground black pepper": {qty: 2, cost: 1.7},
"Maggi cubes": {qty: 5, cost: 2.5},
"salt": {qty: 1, cost: 0.5}
}
}

};

// =======================
// UI
// =======================

const container = document.getElementById("recipes");

for (let key in recipes) {
const r = recipes[key];

let html = `
<div class="recipe">
<label>
<input type="checkbox" value="${key}">
<strong>${r.name}</strong>
</label>
`;

if (r.options?.meat) {
html += `<div class="small">Choose meat:</div>`;
html += `<select id="opt_${key}">`;

r.options.meat.forEach((m, i) => {
html += `<option value="${i}">${m.name} (+£${m.cost})</option>`;
});

html += `</select>`;
}

html += `</div>`;
container.innerHTML += html;
}

// =======================
// GENERATE
// =======================

function generateList() {

const checked = [...document.querySelectorAll("input[type=checkbox]:checked")]
.map(el => el.value);

if (checked.length === 0) {
document.getElementById("output").innerText = "Select at least one recipe.";
return;
}

let result = {};
let totalCost = 0;
let totalServings = 0;

checked.forEach(r => {

const recipe = recipes[r];
totalServings += recipe.servings;

// meat option
if (recipe.options?.meat) {
const sel = document.getElementById(`opt_${r}`);
const chosen = recipe.options.meat[sel.value];

if (!result[chosen.name]) {
result[chosen.name] = {qty: 1, cost: chosen.cost};
} else {
result[chosen.name].qty += 1;
result[chosen.name].cost += chosen.cost;
}

totalCost += chosen.cost;
}

// ingredients
for (let item in recipe.ingredients) {

if (!result[item]) {
result[item] = {...recipe.ingredients[item]};
} else {
result[item].qty += recipe.ingredients[item].qty;
result[item].cost += recipe.ingredients[item].cost;
}

totalCost += recipe.ingredients[item].cost;
}
});

// OUTPUT
let output = "SHOPPING LIST\n\n";

Object.keys(result).sort().forEach(item => {
output += `- ${item}: ${result[item].qty}\n`;
});

output += `\nTOTAL SERVINGS: ${totalServings}`;
output += `\nESTIMATED COST: £${totalCost.toFixed(2)}`;
output += `\nCOST PER SERVING: £${(totalCost / totalServings).toFixed(2)}`;

document.getElementById("output").innerText = output;
}

</script>

</body>
</html>
