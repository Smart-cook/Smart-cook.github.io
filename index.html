// =======================
// RENDER UI
// =======================

const container = document.getElementById("recipes");

for (let key in recipes) {
const r = recipes[key];

let html = `
<div class="recipe">
<label>
<input type="checkbox" value="${key}">
<strong>${r.name}</strong>
</label>
`;

if (r.options?.meat) {
html += `<div class="small">Choose meat:</div>`;
html += `<select id="opt_${key}">`;
r.options.meat.forEach((m,i)=>{
html += `<option value="${i}">${m.name} (+£${m.cost})</option>`;
});
html += `</select>`;
}

html += `</div>`;
container.innerHTML += html;
}

// =======================
// GENERATE
// =======================

function generateList() {

const checked = [...document.querySelectorAll("input[type=checkbox]:checked")]
.map(e=>e.value);

if(!checked.length){
document.getElementById("output").innerText="Select recipes";
return;
}

let items = {};
let totalCost = 0;
let totalServings = 0;

checked.forEach(r=>{

const recipe = recipes[r];
totalServings += recipe.servings;

// meat option
if(recipe.options?.meat){
const sel = document.getElementById(`opt_${r}`);
const choice = recipe.options.meat[sel.value];
items[choice.name] = items[choice.name] || {qty:1,cost:choice.cost};
items[choice.name].cost += choice.cost;
totalCost += choice.cost;
}

// ingredients
for(let k in recipe.ingredients){
if(!items[k]) items[k]= {...recipe.ingredients[k]};
else items[k].cost += recipe.ingredients[k].cost;

totalCost += recipe.ingredients[k].cost;
}

});

// OUTPUT
let out="SHOPPING LIST\n\n";

Object.keys(items).sort().forEach(k=>{
out += `- ${k}: ${items[k].qty}\n`;
});

out += `\nTOTAL SERVINGS: ${totalServings}`;
out += `\nESTIMATED COST: £${totalCost.toFixed(2)}`;
out += `\nCOST PER SERVING: £${(totalCost/totalServings).toFixed(2)}`;

document.getElementById("output").innerText=out;
}
