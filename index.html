<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Batch Cooking Shopping List</title>

<style>
body { font-family: Arial, sans-serif; margin: 20px; max-width: 980px; line-height: 1.4; }
h1 { font-size: 24px; margin-bottom: 6px; }
.recipe {
  margin: 10px 0;
  padding: 12px;
  background: #f7f7f7;
  border-radius: 8px;
}
.small { color: #666; font-size: 12px; margin-top: 5px; }
.option-row { margin-top: 8px; }
select { margin-top: 6px; padding: 6px; max-width: 100%; }
button {
  padding: 10px 14px;
  margin-top: 12px;
  cursor: pointer;
  margin-right: 10px;
}
#output {
  margin-top: 20px;
  white-space: pre-wrap;
  background: #f7f7f7;
  padding: 16px;
  border-radius: 8px;
}
.controls {
  margin: 12px 0;
  padding: 10px;
  background: #fff8e8;
  border-radius: 8px;
}
@media print {
  button, .recipe, .controls, h1 + p { display: none; }
  body { margin: 0; max-width: none; }
  #output { background: #fff; padding: 0; }
}
</style>
</head>

<body>

<h1>Batch Cooking Shopping List Generator</h1>
<p class="small">Select any combination of recipes. Grocery cost is estimated using buyable supermarket pack sizes where known.</p>

<div class="controls">
  <label>
    <input type="checkbox" id="includeOptional" checked>
    Include optional ingredients
  </label>
</div>

<div id="recipes"></div>

<button onclick="generateList()">Generate Shopping List</button>
<button onclick="window.print()">Print</button>

<div id="output"></div>

      { id: "sweet_corn_kernels", name: "sweet corn kernels", amount: 4, unit: "cups", directCost: 1.5 },
      { id: "courgettes", name: "courgettes", amount: 3, unit: "", directCost: 2 },
      { id: "fresh_parsley", name: "fresh parsley", amount: 1, unit: "packet", directCost: 0.52 },
      { id: "olive_oil", name: "olive oil", amount: 118, unit: "ml", displayNote: "1/2 cup", purchaseKey: "olive_oil", purchaseAmount: 118 },
      { id: "ground_black_pepper", name: "ground black pepper", amount: 2, unit: "tsp", purchaseKey: "ground_black_pepper", purchaseAmount: tspToGrams(2, "ground_black_pepper") },
      { id: "maggi", name: "Maggi seasoning cubes", amount: 5, unit: "", purchaseKey: "maggi", purchaseAmount: 5 },
      { id: "salt", name: "salt", amount: 1, unit: "pinch", purchaseKey: "salt", purchaseAmount: pinchSaltToGrams(1) }
    ]
  }
};

// =======================
// UI
// =======================

const container = document.getElementById("recipes");

Object.keys(recipes).forEach(key => {
  const r = recipes[key];
  let html = `
    <div class="recipe">
      <label>
        <input type="checkbox" value="${key}">
        <strong>${r.name}</strong> <span class="small">(${r.servings} servings)</span>
      </label>
  `;

  if (r.options?.meat) {
    html += `<div class="option-row small">Choose meat for ${r.name}:</div>`;
    html += `<select id="opt_${key}_meat">`;
    r.options.meat.forEach((m, i) => {
      html += `<option value="${i}">${m.name} — ${formatNumber(m.amount)} ${m.unit} (+£${m.directCost.toFixed(2)})</option>`;
    });
    html += `</select>`;
  }

  html += `</div>`;
  container.innerHTML += html;
});

// =======================
// HELPERS
// =======================

function formatNumber(n) {
  if (Number.isInteger(n)) return String(n);
  return Number(n.toFixed(2)).toString();
}

function formatAmount(item) {
  if (item.displayOverride && item.count === 1) return item.displayOverride;

  if (item.amountMin !== undefined || item.amountMax !== undefined) {
    const min = item.amountMin ?? item.amount ?? 0;
    const max = item.amountMax ?? item.amount ?? 0;
    if (min !== max) return `${formatNumber(min)}–${formatNumber(max)}${item.unit ? " " + item.unit : ""}`;
    return `${formatNumber(max)}${item.unit ? " " + item.unit : ""}`;
  }

  if (item.unit === "pinch") {
    return item.amount === 1 ? "pinch" : `${formatNumber(item.amount)} pinches`;
  }

  if (item.displayNote && item.count === 1) {
    return `${item.displayNote}${item.amount && item.unit ? ` (${formatNumber(item.amount)} ${item.unit})` : ""}`;
  }

  return `${formatNumber(item.amount)}${item.unit ? " " + item.unit : ""}`;
}

function addDisplayItem(items, ingredient) {
  const key = ingredient.id;

  if (!items[key]) {
    items[key] = {
      id: ingredient.id,
      name: ingredient.name,
      amount: ingredient.amount || 0,
      amountMin: ingredient.amountMin,
      amountMax: ingredient.amountMax,
      unit: ingredient.unit || "",
      displayNote: ingredient.displayNote,
      displayOverride: ingredient.displayOverride,
      count: 1
    };
    return;
  }

  const existing = items[key];
  existing.count += 1;

  if (existing.unit === ingredient.unit) {
    existing.amount = (existing.amount || 0) + (ingredient.amount || 0);
    if (ingredient.amountMin !== undefined || existing.amountMin !== undefined) {
      existing.amountMin = (existing.amountMin || existing.amount || 0) + (ingredient.amountMin || ingredient.amount || 0);
      existing.amountMax = (existing.amountMax || existing.amount || 0) + (ingredient.amountMax || ingredient.amount || 0);
    }
    existing.displayOverride = null;
    existing.displayNote = null;
  } else {
    // Fallback: preserve both units if a future ingredient uses a genuinely different unit.
    const oldText = formatAmount(existing);
    const newText = ingredient.displayOverride || ingredient.displayNote || `${formatNumber(ingredient.amount || 0)} ${ingredient.unit || ""}`.trim();
    existing.name = ingredient.name;
    existing.amount = 0;
    existing.unit = "";
    existing.displayOverride = `${oldText} + ${newText}`;
  }
}

function addPurchaseAmount(purchases, ingredient) {
  if (!ingredient.purchaseKey) return 0;
  purchases[ingredient.purchaseKey] = (purchases[ingredient.purchaseKey] || 0) + (ingredient.purchaseAmount || 0);
  return 0;
}

function calculatePackCost(purchases) {
  let total = 0;
  const lines = [];

  Object.keys(purchases).sort().forEach(key => {
    if (key === "mixed_bell_peppers") return;
    const rule = purchaseRules[key];
    if (!rule) return;
    const amount = purchases[key];
    const packs = Math.ceil(amount / rule.packSize);
    const cost = packs * rule.price;
    total += cost;
    lines.push(`- ${rule.label}: buy ${packs} x ${rule.packLabel} = £${cost.toFixed(2)}`);
  });

  return { total, lines };
}

function calculateMixedPepperCost(colourCounts) {
  const red = colourCounts.red || 0;
  const yellow = colourCounts.yellow || 0;
  const green = colourCounts.green || 0;
  const packs = Math.max(red, yellow, green);
  if (packs === 0) return { total: 0, line: null };
  const cost = packs * purchaseRules.mixed_bell_peppers.price;
  return {
    total: cost,
    line: `- mixed colour bell peppers: buy ${packs} x ${purchaseRules.mixed_bell_peppers.packLabel} = £${cost.toFixed(2)}`
  };
}

// =======================
// GENERATE
// =======================

function generateList() {
  const checked = [...document.querySelectorAll("input[type=checkbox]:checked")]
    .filter(el => el.id !== "includeOptional")
    .map(el => el.value);

  const includeOptional = document.getElementById("includeOptional").checked;

  if (!checked.length) {
    document.getElementById("output").innerText = "Select at least one recipe.";
    return;
  }

  const displayItems = {};
  const purchases = {};
  const pepperColours = { red: 0, yellow: 0, green: 0 };
  let directCost = 0;
  let totalServings = 0;
  const servingLines = [];

  checked.forEach(recipeKey => {
    const recipe = recipes[recipeKey];
    totalServings += recipe.servings;
    servingLines.push(`- ${recipe.name}: ${recipe.servings} servings`);

    if (recipe.options?.meat) {
      const select = document.getElementById(`opt_${recipeKey}_meat`);
      const chosen = recipe.options.meat[Number(select.value)];
      addDisplayItem(displayItems, chosen);
      directCost += chosen.directCost;
    }

    recipe.ingredients.forEach(ingredient => {
      if (ingredient.optional && !includeOptional) return;

      addDisplayItem(displayItems, ingredient);

      if (ingredient.pepperColour) {
        pepperColours[ingredient.pepperColour] += ingredient.purchaseAmount || ingredient.amount || 0;
      } else if (ingredient.purchaseKey) {
        addPurchaseAmount(purchases, ingredient);
      } else {
        directCost += ingredient.directCost || 0;
      }
    });
  });

  const packCost = calculatePackCost(purchases);
  const mixedPepperCost = calculateMixedPepperCost(pepperColours);
  const totalCost = directCost + packCost.total + mixedPepperCost.total;

  let out = "SHOPPING LIST\n\n";

  Object.values(displayItems)
    .sort((a, b) => a.name.localeCompare(b.name))
    .forEach(item => {
      out += `- ${item.name}: ${formatAmount(item)}\n`;
    });

  out += "\nSERVINGS\n";
  out += servingLines.join("\n");
  out += `\n- Total servings: ${totalServings}\n`;

  out += "\nESTIMATED GROCERY COST\n";
  out += `- Direct item costs: £${directCost.toFixed(2)}\n`;
  if (packCost.lines.length || mixedPepperCost.line) {
    out += "- Pack-aware costs used:\n";
    packCost.lines.forEach(line => { out += `${line}\n`; });
    if (mixedPepperCost.line) out += `${mixedPepperCost.line}\n`;
  }
  out += `\nEstimated grocery bill: £${totalCost.toFixed(2)}`;
  out += `\nCost per serving: £${(totalCost / totalServings).toFixed(2)}`;

  document.getElementById("output").innerText = out;
}
