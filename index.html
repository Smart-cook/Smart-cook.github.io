  if (r.options && r.options.meat) {
    html += `<div class="optionBox"><div class="small">Choose meat:</div><select id="meat_${key}">`;
    r.options.meat.forEach((m, i) => {
      html += `<option value="${i}">${m.name}: ${m.qty}</option>`;
    });
    html += `</select></div>`;
  }

  if (r.optional && r.optional.length) {
    html += `<div class="optionBox"><div class="small">Optional ingredients:</div>`;
    r.optional.forEach((item, i) => {
      html += `<label class="small"><input type="checkbox" id="optional_${key}_${i}"> ${item.name}: ${item.qty}</label><br>`;
    });
    html += `</div>`;
  }

  html += `</div>`;
  container.innerHTML += html;
});

function addAmount(map, key, item) {
  if (!map[key]) {
    map[key] = {
      name: item.name,
      amount: 0,
      unit: item.unit,
      displayAmount: 0,
      displayUnit: item.displayUnit || item.unit,
      qtyParts: [],
      directCost: 0,
      pack: item.pack || null
    };
  }

  map[key].amount += Number(item.amount || 0);

  if (typeof item.displayAmount === "number") {
    map[key].displayAmount += item.displayAmount;
  } else if (item.displayAmount) {
    map[key].qtyParts.push(item.qty);
  } else if (!item.pack) {
    map[key].displayAmount += Number(item.amount || 0);
  }

  if (item.directCost) map[key].directCost += item.directCost;
}

function ingredientKey(item) {
  if (item.pack) return `pack:${item.pack}`;
  return `direct:${item.name.toLowerCase()}:${item.unit}`;
}

function formatNeeded(entry) {
  if (entry.qtyParts.length) return entry.qtyParts.join(" + ");

  const value = Math.round(entry.displayAmount * 100) / 100;
  if (entry.displayUnit === "") return `${value}`;
  return `${value} ${entry.displayUnit}`;
}

function generateList() {
  const checked = [...document.querySelectorAll('input[type="checkbox"][value]:checked')].map(e => e.value);

  if (!checked.length) {
    document.getElementById("output").innerText = "Select at least one recipe.";
    return;
  }

  const items = {};
  let totalServings = 0;

  checked.forEach(recipeKey => {
    const recipe = recipes[recipeKey];
    totalServings += recipe.servings;

    if (recipe.options && recipe.options.meat) {
      const selectedIndex = document.getElementById(`meat_${recipeKey}`).value;
      const meat = recipe.options.meat[selectedIndex];
      addAmount(items, ingredientKey(meat), meat);
    }

    recipe.ingredients.forEach(item => addAmount(items, ingredientKey(item), item));

    if (recipe.optional) {
      recipe.optional.forEach((item, i) => {
        const box = document.getElementById(`optional_${recipeKey}_${i}`);
        if (box && box.checked) addAmount(items, ingredientKey(item), item);
      });
    }
  });

  let totalCost = 0;
  let out = "SHOPPING LIST\n\n";

  const keys = Object.keys(items).sort((a, b) => items[a].name.localeCompare(items[b].name));

  keys.forEach(key => {
    const item = items[key];
    const needed = formatNeeded(item);

    if (item.pack) {
      const pack = allPacks[item.pack];
      const packsNeeded = Math.ceil(item.amount / pack.packQty);
      const cost = packsNeeded * pack.price;
      totalCost += cost;
      out += `- ${pack.label}: ${needed} — buy ${packsNeeded} x ${pack.packLabel} (£${cost.toFixed(2)})\n`;
    } else {
      totalCost += item.directCost;
      out += `- ${item.name}: ${needed} (£${item.directCost.toFixed(2)})\n`;
    }
  });

  out += `\nTOTAL SERVINGS: ${totalServings}`;
  out += `\nESTIMATED GROCERY BILL: £${totalCost.toFixed(2)}`;
  out += `\nESTIMATED COST PER SERVING: £${(totalCost / totalServings).toFixed(2)}`;
  out += `\n\nNote: Cost is estimated from supermarket pack sizes, so shared ingredients such as oil, spices, salt, flour, onions, tomatoes, carrots, garlic and seasoning cubes are only costed by the number of packs/bottles/jars needed.`;

  document.getElementById("output").innerText = out;
}
</script>
