<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Batch Cooking Shopping List</title>

<style>
body { font-family: Arial, sans-serif; margin: 20px; max-width: 950px; line-height: 1.4; }
h1 { font-size: 24px; }
.recipe { margin: 10px 0; padding: 12px; background: #f7f7f7; border-radius: 8px; border: 1px solid #ddd; }
.small { color: #555; font-size: 13px; margin-top: 6px; }
.optionBox { margin: 8px 0 0 24px; }
select { margin-top: 6px; padding: 6px; }
button { padding: 11px 14px; margin-top: 14px; cursor: pointer; margin-right: 10px; }
#output { margin-top: 22px; white-space: pre-wrap; background: #f7f7f7; padding: 16px; border-radius: 8px; border: 1px solid #ddd; }
</style>
</head>

<body>

<h1>Batch Cooking Shopping List Generator</h1>

<p class="small intro">
Select recipes. Meat choices and optional ingredients are included only when selected.
</p>

<p class="small" style="font-style:italic; max-width:800px;">
* Prices are estimated using a collection of UK supermarket prices as of June 2026.
Actual costs may vary by retailer, location and over time due to inflation.
</p> 

<div id="recipes"></div>

<button onclick="generateList()">Generate Shopping List</button>
<button onclick="window.print()">Print</button>

<div id="output"></div>

<script>

  butter: { label: "butter", size: 240, unit: "g", price: 2, category: "Dairy" },
  flour: { label: "flour", size: 1500, unit: "g", price: 0.7, category: "Oils, Sauces & Pantry" },
  salt: { label: "salt", size: 750, unit: "g", price: 0.5, category: "Seasonings, Herbs & Spices" },
  blackPepper: { label: "ground black pepper", size: 100, unit: "g", price: 1.7, category: "Seasonings, Herbs & Spices" },

  driedRosemary: spicePack("dried rosemary", 0.6),
  driedThyme: spicePack("dried thyme", 0.85),
  curryPowder: spicePack("curry powder", 1),
  garamMasala: spicePack("garam masala", 1),
  groundCoriander: spicePack("ground coriander", 0.7),
  groundCumin: spicePack("ground cumin", 0.6),
  groundTurmeric: spicePack("ground turmeric", 0.6),
  cayennePepper: spicePack("cayenne pepper", 0.6),
  japaneseKatsuCurryPowder: spicePack("Japanese/Katsu curry powder", 3, 130),
  chinese5Spice: spicePack("Chinese 5 spice", 1),
  redChilliPowder: spicePack("red chilli powder", 0.6),
  groundNutmeg: spicePack("ground nutmeg", 0.7),
  mustardPowder: spicePack("mustard powder", 1.5),

function tspToG(x) { return x * 5; }
function tbspToG(x) { return x * 15; }
function cupFlourToG(x) { return x * 120; }
function cupButterToG(x) { return x * 227; }

function item(name, category, displayAmount, displayUnit, directCost, costAmount, costUnit) {
  return { name, category, displayAmount, displayUnit, costAmount: costAmount ?? displayAmount, costUnit: costUnit || displayUnit, directCost: directCost || 0 };
}

function packItem(name, pack, displayAmount, displayUnit, costAmount, costUnit) {
  return { name, category: packs[pack].category, displayAmount, displayUnit, costAmount: costAmount ?? displayAmount, costUnit: costUnit || displayUnit, pack };
}

function spice(name, pack, amount, unit) {
  return packItem(name, pack, amount, unit, unit === "tbsp" ? tbspToG(amount) : tspToG(amount), "g");
}

function salt(amount, unit) {
  return packItem("salt", "salt", amount, unit, tspToG(amount), "g");
}

function pepper(amount, unit) {
  return packItem("ground black pepper", "blackPepper", amount, unit, tspToG(amount), "g");
}

      packItem("red onions", "redOnions", 4, "onions"),
      item("ginger", "Vegetables", 6, "inches", 0.7),
      spice("ground cumin", "groundCumin", 3, "tsp"),

      spice("ground coriander", "groundCoriander", 3, "tsp"),

  fesenjan: {

    servings: 13,
    ingredients: [
      item("walnuts", "Oils, Sauces & Pantry", 800, "g", 7),

      packItem("red onions", "redOnions", 4, "onions"),

      packItem("chicken stock cubes", "chickenStock", 3, "cubes"),
      packItem("Maggi seasoning cubes", "maggi", 3, "cubes"),
      pepper(4, "tsp"),
      spice("ground turmeric", "groundTurmeric", 2, "tsp"),

      item("lime", "Fruit", 1, "lime", 0.25)
    ],
    optional: [
      spice("cinnamon powder", "cinnamon", 2, "tsp"),

  succotash: {

      packItem("red onions", "redOnions", 3, "onions"),

    ]

};

const container = document.getElementById("recipes");

Object.keys(recipes).forEach(key => {
  const r = recipes[key];
  let html = `<div class="recipe"><label><input type="checkbox" value="${key}"> <strong>${r.name}</strong> <span class="small">(${r.servings} servings)</span></label>`;

  if (r.options && r.options.meat) {
    html += `<div class="optionBox"><div class="small">Choose meat:</div><select id="meat_${key}">`;
    r.options.meat.forEach((m, i) => html += `<option value="${i}">${m.name}: ${formatAmount(m.displayAmount, m.displayUnit)}</option>`);
    html += `</select></div>`;
  }

  if (r.optional && r.optional.length) {
    html += `<div class="optionBox"><div class="small">Optional ingredients:</div>`;
    r.optional.forEach((opt, i) => {
      html += `<label class="small"><input type="checkbox" id="optional_${key}_${i}"> ${opt.name}: ${formatAmount(opt.displayAmount, opt.displayUnit)}</label><br>`;
    });
    html += `</div>`;
  }

  html += `</div>`;
  container.innerHTML += html;
});

function addToMap(map, ingredient) {
  const key = ingredient.pack ? `pack:${ingredient.pack}` : `direct:${ingredient.name.toLowerCase()}:${ingredient.displayUnit}`;

  if (!map[key]) {
    map[key] = {
      name: ingredient.pack ? packs[ingredient.pack].label : ingredient.name,
      category: ingredient.pack ? packs[ingredient.pack].category : ingredient.category,
      displayAmount: 0,
      displayUnit: ingredient.displayUnit,
      costAmount: 0,
      directCost: 0,
      pack: ingredient.pack || null
    };
  }

  if (typeof ingredient.displayAmount === "number") {
    map[key].displayAmount += ingredient.displayAmount;
  } else {
    map[key].displayAmount = ingredient.displayAmount;
  }

  map[key].costAmount += typeof ingredient.costAmount === "number" ? ingredient.costAmount : 1;

  if (!ingredient.pack) map[key].directCost += ingredient.directCost || 0;
}

function formatAmount(amount, unit) {
  if (typeof amount === "string") return amount;
  const rounded = Math.round(amount * 100) / 100;

  if (!unit) return `${rounded}`;
  if (unit === "cup" || unit === "cups") {
    if (rounded === 0.25) return "1/4 cup";
    if (rounded === 0.5) return "1/2 cup";
    if (rounded === 0.75) return "3/4 cup";
    if (rounded === 1) return "1 cup";
    return `${rounded} cups`;
  }

  if (unit === "ml") return `${Math.round(rounded)} ml`;
  if (unit === "g") return `${Math.round(rounded)} g`;
  if (unit === "kg") return `${rounded} kg`;
  if (unit === "tsp") return `${rounded} tsp`;
  if (unit === "tbsp") return `${rounded} tbsp`;

  return `${rounded} ${unit}`;
}

function generateList() {
  const checked = [...document.querySelectorAll('input[type="checkbox"][value]:checked')].map(e => e.value);

  if (!checked.length) {
    document.getElementById("output").innerText = "Select at least one recipe.";
    return;
  }

  const shopping = {};
  let totalServings = 0;

  checked.forEach(recipeKey => {
    const recipe = recipes[recipeKey];
    totalServings += recipe.servings;

    if (recipe.options && recipe.options.meat) {
      const selected = document.getElementById(`meat_${recipeKey}`).value;
      addToMap(shopping, recipe.options.meat[selected]);
    }

    recipe.ingredients.forEach(i => addToMap(shopping, i));

    if (recipe.optional) {
      recipe.optional.forEach((opt, i) => {
        const box = document.getElementById(`optional_${recipeKey}_${i}`);
        if (box && box.checked) addToMap(shopping, opt);
      });
    }
  });

  const grouped = {};
  let totalCost = 0;

  Object.values(shopping).forEach(entry => {
    let cost = entry.directCost || 0;

    if (entry.pack) {
      const p = packs[entry.pack];
      cost = Math.ceil(entry.costAmount / p.size) * p.price;
    }

    totalCost += cost;

    if (!grouped[entry.category]) grouped[entry.category] = [];
    grouped[entry.category].push(`- ${entry.name}: ${formatAmount(entry.displayAmount, entry.displayUnit)}`);
  });

  const order = ["Meat & Seafood", "Vegetables", "Fruit", "Fresh Herbs", "Dairy", "Oils, Sauces & Pantry", "Seasonings, Herbs & Spices", "Other"];

  let output = "SHOPPING LIST\n\n";

  order.forEach(category => {
    if (grouped[category]) {
      output += `${category.toUpperCase()}\n`;
      grouped[category].sort().forEach(line => output += `${line}\n`);
      output += "\n";
    }
  });

  output += `TOTAL SERVINGS: ${totalServings}`;
  output += `\nESTIMATED TOTAL COST: £${totalCost.toFixed(2)}`;
  output += `\nESTIMATED COST PER SERVING: £${(totalCost / totalServings).toFixed(2)}`;

  document.getElementById("output").innerText = output;
}
</script>

</body>
</html>
